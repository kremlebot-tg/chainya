name: Публикация сайта

# dist/ намеренно не хранится в гите: он собирается из src.html здесь,
# поэтому опубликованный сайт всегда соответствует исходнику.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Собрать dist
        run: python3 build.py --web

      - name: Проверить, что собралось
        run: |
          test -f dist/index.html
          test -d dist/img
          test -d dist/fonts
          echo "index.html: $(du -h dist/index.html | cut -f1)"
          echo "файлов в dist: $(find dist -type f | wc -l)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
