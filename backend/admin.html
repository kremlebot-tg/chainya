<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#171513">
  <link rel="icon" href="/favicon.png">
  <title>Управление заказами · Чайня</title>
  <style>
    :root{color-scheme:dark;--bg:#121110;--surface:#1a1816;--surface-2:#211e1b;--line:#39342f;--line-2:#4a433c;--text:#f1eee9;--muted:#aaa29a;--quiet:#77716b;--gold:#d3a350;--green:#77ad83;--blue:#74a7c7;--red:#d3786d;--orange:#ce955d;--radius:16px;--shadow:0 20px 60px #0004}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;color:var(--text);background:var(--bg);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,input,select{font:inherit}button{cursor:pointer}.shell{min-height:100vh}.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:#121110ed;backdrop-filter:blur(18px)}.topbar__in{width:min(1240px,calc(100% - 40px));height:72px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{display:flex;align-items:center;gap:12px}.brand__mark{display:grid;place-items:center;width:34px;height:34px;border:1px solid var(--line-2);border-radius:10px;color:var(--gold);font:17px Georgia,serif}.brand h1{margin:0;font:20px/1.1 Georgia,serif}.brand small{display:block;margin-top:4px;color:var(--quiet);font:11px/1 sans-serif;letter-spacing:.12em;text-transform:uppercase}.top-actions{display:flex;align-items:center;gap:9px}.sync{color:var(--quiet);font-size:12px}.icon-btn,.btn,.select,.search{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:10px}.icon-btn{width:40px;height:40px;display:grid;place-items:center;padding:0}.icon-btn:hover,.btn:hover{border-color:var(--line-2);background:var(--surface-2)}.icon-btn svg{width:18px;fill:none;stroke:currentColor;stroke-width:1.8}.main{width:min(1240px,calc(100% - 40px));margin:30px auto 80px}.hero{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:24px}.hero h2{font:clamp(28px,4vw,42px)/1.1 Georgia,serif;margin:0 0 8px}.hero p{margin:0;color:var(--muted)}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}.metric{padding:16px 18px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(145deg,var(--surface-2),var(--surface))}.metric__label{color:var(--muted);font-size:12px}.metric__value{display:block;margin-top:6px;font-size:25px;font-weight:700;font-variant-numeric:tabular-nums}.metric--attention .metric__value{color:var(--gold)}.workspace{border:1px solid var(--line);border-radius:20px;background:var(--surface);box-shadow:var(--shadow);overflow:hidden}.tabs{display:flex;gap:4px;padding:10px;border-bottom:1px solid var(--line)}.tab{border:0;border-radius:10px;background:transparent;color:var(--muted);padding:10px 14px;font-weight:650}.tab[aria-selected="true"]{background:var(--surface-2);color:var(--text)}.count{display:inline-grid;place-items:center;min-width:21px;height:21px;margin-left:7px;padding:0 6px;border-radius:99px;background:#ffffff0d;color:var(--muted);font-size:11px}.toolbar{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--line)}.search-wrap{position:relative;flex:1}.search{width:100%;height:42px;padding:0 14px 0 40px;outline:none}.search:focus{border-color:#806b49;box-shadow:0 0 0 3px #d3a35012}.search-wrap svg{position:absolute;left:14px;top:12px;width:18px;fill:none;stroke:var(--quiet);stroke-width:1.8}.select{height:42px;padding:0 36px 0 12px;outline:none}.list{display:grid}.order{display:grid;grid-template-columns:180px minmax(280px,1.15fr) minmax(250px,.9fr) 180px;gap:22px;padding:20px;border-bottom:1px solid var(--line);transition:background .15s}.order:last-child{border-bottom:0}.order:hover{background:#ffffff02}.order__number{font-size:15px;font-weight:750;letter-spacing:.02em}.order__date{color:var(--quiet);font-size:12px;margin-top:5px}.badge{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:5px 9px;border:1px solid var(--line);border-radius:99px;color:var(--muted);font-size:11px;font-weight:650}.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--quiet)}.badge[data-status="paid"]::before,.badge[data-status="confirmed"]::before{background:var(--gold)}.badge[data-status="packing"]::before{background:var(--orange)}.badge[data-status="shipped"]::before{background:var(--blue)}.badge[data-status="completed"]::before{background:var(--green)}.badge[data-status="cancelled"]::before{background:var(--red)}.items{display:grid;gap:8px}.item{display:grid;grid-template-columns:1fr auto;gap:10px}.item__name{font-weight:600}.item__meta{color:var(--muted);font-size:12px}.money{white-space:nowrap;font-variant-numeric:tabular-nums}.summary-line{display:flex;justify-content:space-between;gap:12px;margin-top:7px;padding-top:10px;border-top:1px solid var(--line);font-size:16px}.customer{min-width:0}.customer__name{font-weight:700;margin-bottom:7px}.detail{display:flex;align-items:flex-start;gap:7px;color:var(--muted);margin:4px 0;overflow-wrap:anywhere}.detail svg{width:15px;min-width:15px;margin-top:2px;fill:none;stroke:var(--quiet);stroke-width:1.7}.detail a{color:var(--text);text-decoration:none}.detail a:hover{text-decoration:underline}.note{margin-top:10px;padding:9px 11px;border-left:2px solid var(--line-2);background:#0002;color:var(--muted);border-radius:0 8px 8px 0}.delivery{color:var(--muted);font-size:12px;margin-top:8px}.actions{display:flex;flex-direction:column;gap:8px}.status-select{width:100%;height:40px;padding:0 10px;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:9px}.btn{height:40px;padding:0 13px;font-weight:650}.btn--primary{background:var(--gold);border-color:var(--gold);color:#1c160d}.btn--primary:hover{background:#dfb15f}.btn:disabled{opacity:.42;cursor:default}.copy-btn{height:34px;color:var(--muted);font-size:12px}.lead{display:grid;grid-template-columns:180px minmax(240px,.8fr) 1fr 180px;gap:22px;padding:20px;border-bottom:1px solid var(--line)}.lead:last-child{border-bottom:0}.lead__company{font-size:16px;font-weight:700}.state,.empty{padding:64px 24px;text-align:center;color:var(--muted)}.state strong,.empty strong{display:block;color:var(--text);font-size:16px;margin-bottom:5px}.skeleton{height:112px;margin:16px;border-radius:14px;background:linear-gradient(90deg,var(--surface-2),#2a2622,var(--surface-2));background-size:200% 100%;animation:shimmer 1.3s infinite}@keyframes shimmer{to{background-position:-200% 0}}.toast{position:fixed;right:22px;bottom:22px;z-index:30;padding:12px 16px;border:1px solid var(--line-2);border-radius:11px;background:#292520;box-shadow:var(--shadow);transform:translateY(20px);opacity:0;pointer-events:none;transition:.2s}.toast.on{transform:none;opacity:1}.access-error{width:min(520px,calc(100% - 32px));margin:15vh auto;padding:30px;border:1px solid var(--line);border-radius:20px;background:var(--surface);text-align:center}.access-error h2{font:28px Georgia,serif;margin:0 0 10px}.access-error p{color:var(--muted)}
    @media(max-width:1000px){.order{grid-template-columns:150px 1fr 1fr}.actions{grid-column:2/4;flex-direction:row}.actions>*{flex:1}.lead{grid-template-columns:150px .8fr 1fr}.lead .actions{grid-column:2/4}.metrics{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:680px){.topbar__in,.main{width:min(100% - 24px,1240px)}.topbar__in{height:64px}.brand small,.sync{display:none}.main{margin-top:20px}.hero{align-items:start}.hero p{max-width:28ch}.metrics{gap:8px}.metric{padding:13px}.metric__value{font-size:21px}.workspace{margin-inline:-12px;border-radius:16px}.toolbar{align-items:stretch;flex-direction:column}.select{width:100%}.order,.lead{grid-template-columns:1fr;padding:18px;gap:16px}.actions,.lead .actions{grid-column:auto;flex-direction:row}.order__identity{display:flex;justify-content:space-between;gap:12px;align-items:start}.badge{margin-top:0}.customer{padding-top:14px;border-top:1px solid var(--line)}.top-actions .sync{display:none}.toast{left:12px;right:12px;bottom:12px;text-align:center}}
  </style>
</head>
<body>
<div class="shell" id="app" hidden>
  <header class="topbar"><div class="topbar__in">
    <div class="brand"><span class="brand__mark">Ч</span><div><h1>Чайня</h1><small>управление</small></div></div>
    <div class="top-actions"><button class="btn copy-btn" id="saby-state" disabled>Saby: проверяем</button><span class="sync" id="sync-label"></span><button class="icon-btn" id="reload" aria-label="Обновить"><svg viewBox="0 0 24 24"><path d="M20 6v5h-5M4 18v-5h5M18.5 9A7 7 0 0 0 6.2 6.2L4 8m16 8-2.2 1.8A7 7 0 0 1 5.5 15"/></svg></button></div>
  </div></header>
  <main class="main">
    <div class="hero"><div><h2>Рабочая панель</h2><p>Заказы магазина и обращения от бизнеса в одном месте.</p></div></div>
    <section class="metrics" aria-label="Сводка">
      <div class="metric metric--attention"><span class="metric__label">Новые заказы</span><strong class="metric__value" id="m-new">—</strong></div>
      <div class="metric"><span class="metric__label">В работе</span><strong class="metric__value" id="m-work">—</strong></div>
      <div class="metric"><span class="metric__label">Выручка сегодня</span><strong class="metric__value" id="m-revenue">—</strong></div>
      <div class="metric"><span class="metric__label">Новые B2B</span><strong class="metric__value" id="m-leads">—</strong></div>
    </section>
    <section class="workspace">
      <div class="tabs" role="tablist"><button class="tab" id="tab-orders" role="tab" aria-selected="true">Заказы <span class="count" id="orders-count">0</span></button><button class="tab" id="tab-leads" role="tab" aria-selected="false">Для бизнеса <span class="count" id="leads-count">0</span></button></div>
      <div class="toolbar"><div class="search-wrap"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16 16 5 5"/></svg><input class="search" id="search" type="search" placeholder="Номер, имя, телефон, город…" aria-label="Поиск" autocomplete="off"></div><select class="select" id="status-filter" aria-label="Статус"><option value="">Все статусы</option></select></div>
      <div id="content"><div class="skeleton"></div><div class="skeleton"></div></div>
    </section>
  </main>
</div>
<div class="access-error" id="access" hidden><h2>Нет доступа</h2><p>Откройте полную секретную ссылку на панель. Ключ находится после символа #.</p></div>
<div class="toast" id="toast" role="status"></div>
<script>
const fragment=location.hash.slice(1);if(fragment)sessionStorage.setItem('chainya-admin-token',fragment);const token=fragment||sessionStorage.getItem('chainya-admin-token')||'';
const ORDER_LABELS={pending_payment:'Ожидает оплаты',paid:'Новый · оплачен',confirmed:'Подтверждён',packing:'Собирается',shipped:'Передан в доставку',completed:'Завершён',cancelled:'Отменён'};
const LEAD_LABELS={new:'Новая',contacted:'Связались',closed:'Закрыта'};
const ORDER_STATUSES=['paid','confirmed','packing','shipped','completed','cancelled'];
const DELIVERY={pickup:'Самовывоз · Острякова, 3',cdek_pvz:'СДЭК · пункт выдачи',cdek_courier:'СДЭК · курьер'};
const PAYMENT={bank_card:'Банковская карта',sbp:'СБП'};
const $=s=>document.querySelector(s),content=$('#content');let orders=[],leads=[],activeTab='orders';
const auth=()=>({Authorization:`Bearer ${token}`});const rub=n=>new Intl.NumberFormat('ru-RU').format(n)+' ₽';
const node=(tag,text='',cls='')=>{const el=document.createElement(tag);if(text!==undefined)el.textContent=text;if(cls)el.className=cls;return el};
const icon=path=>{const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 24 24');const p=document.createElementNS(svg.namespaceURI,'path');p.setAttribute('d',path);svg.append(p);return svg};
function toast(message){const el=$('#toast');el.textContent=message;el.classList.add('on');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.remove('on'),2200)}
function fmtDate(value){return new Intl.DateTimeFormat('ru-RU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(value))}
function isToday(value){const d=new Date(value),n=new Date();return d.toDateString()===n.toDateString()}
function searchable(value){return JSON.stringify(value).toLocaleLowerCase('ru')}
function detail(path,value,href){if(!value)return null;const row=node('div','', 'detail');row.append(icon(path));const valueEl=href?node('a',value):node('span',value);if(href)valueEl.href=href;row.append(valueEl);return row}
function statusSelect(current,labels,values){const select=node('select','', 'status-select');values.forEach(value=>select.add(new Option(labels[value],value,value===current,value===current)));return select}
function renderOrder(o){
  const card=node('article','', 'order');const identity=node('div','', 'order__identity');const idWrap=node('div');idWrap.append(node('div','№ '+o.id,'order__number'),node('div',fmtDate(o.created_at),'order__date'));const badge=node('span',ORDER_LABELS[o.status]||o.status,'badge');badge.dataset.status=o.status;identity.append(idWrap,badge);
  const itemWrap=node('div','', 'items');o.items.forEach(item=>{const row=node('div','', 'item');const info=node('div');info.append(node('div',item.name,'item__name'),node('div',(item.pack==='pc'?'1 шт.':item.pack+' г')+' × '+item.qty,'item__meta'));row.append(info,node('span',rub(item.total),'money'));itemWrap.append(row)});const total=node('div','', 'summary-line');total.append(node('strong','Итого'),node('strong',rub(o.total),'money'));itemWrap.append(total);
  const c=o.customer||{},customer=node('div','', 'customer');customer.append(node('div',c.name||'Без имени','customer__name'));[detail('M5 4h4l2 5-2.5 1.5a15 15 0 0 0 5 5L15 13l5 2v4c0 1-1 2-2 2C9.7 20.5 3.5 14.3 3 6c0-1 1-2 2-2Z',c.phone,c.phone?'tel:'+c.phone.replace(/[^+\d]/g,''):''),detail('M12 21s7-5.4 7-12a7 7 0 1 0-14 0c0 6.6 7 12 7 12Zm0-9a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z',[c.city,c.pvz_code?'ПВЗ '+c.pvz_code:c.address].filter(Boolean).join(' · '))].filter(Boolean).forEach(x=>customer.append(x));if(c.note)customer.append(node('div',c.note,'note'));customer.append(node('div',(DELIVERY[o.delivery]||o.delivery)+' · '+rub(o.delivery_price)+' · '+(PAYMENT[o.payment_method]||o.payment_method),'delivery'));
  const actions=node('div','', 'actions'),select=statusSelect(o.status,ORDER_LABELS,ORDER_STATUSES),save=node('button','Сохранить','btn btn--primary');save.disabled=true;select.onchange=()=>save.disabled=select.value===o.status;save.onclick=()=>updateOrder(o.id,select.value,save);const copy=node('button','Скопировать заказ','btn copy-btn');copy.onclick=()=>copyOrder(o);actions.append(select,save,copy);card.append(identity,itemWrap,customer,actions);return card;
}
function renderLead(lead){const card=node('article','', 'lead');const identity=node('div');identity.append(node('div','№ '+lead.id,'order__number'),node('div',fmtDate(lead.created_at),'order__date'));const badge=node('span',LEAD_LABELS[lead.status]||lead.status,'badge');badge.dataset.status=lead.status;identity.append(badge);const person=node('div');person.append(node('div',lead.company||'Без названия','lead__company'),node('div',lead.name||'Имя не указано','muted'));const body=node('div');const contact=detail('M5 4h4l2 5-2.5 1.5a15 15 0 0 0 5 5L15 13l5 2v4c0 1-1 2-2-2 2C9.7 20.5 3.5 14.3 3 6c0-1 1-2 2-2Z',lead.contact,lead.contact.startsWith('@')?'https://t.me/'+lead.contact.slice(1):'tel:'+lead.contact.replace(/[^+\d]/g,''));if(contact)body.append(contact);if(lead.note)body.append(node('div',lead.note,'note'));const actions=node('div','', 'actions'),select=statusSelect(lead.status,LEAD_LABELS,['new','contacted','closed']),save=node('button','Сохранить','btn btn--primary');save.disabled=true;select.onchange=()=>save.disabled=select.value===lead.status;save.onclick=()=>updateLead(lead.id,select.value,save);actions.append(select,save);card.append(identity,person,body,actions);return card}
function copyOrder(o){const c=o.customer||{};const lines=[`Заказ № ${o.id}`,...o.items.map(x=>`${x.name} · ${x.pack==='pc'?'шт.':x.pack+' г'} × ${x.qty} — ${rub(x.total)}`),`Итого: ${rub(o.total)}`,c.name?`Имя: ${c.name}`:'',c.phone?`Телефон: ${c.phone}`:'',[c.city,c.pvz_code,c.address].filter(Boolean).join(', ')].filter(Boolean);navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('Заказ скопирован'))}
async function updateOrder(id,status,button){button.disabled=true;try{const r=await fetch('/api/admin/orders/'+id,{method:'PATCH',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({status})});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');toast('Статус заказа обновлён');await load()}catch(e){toast(e.message);button.disabled=false}}
async function updateLead(id,status,button){button.disabled=true;try{const r=await fetch('/api/admin/business-leads/'+id,{method:'PATCH',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({status})});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');toast('Статус заявки обновлён');await load()}catch(e){toast(e.message);button.disabled=false}}
async function loadSabyStatus(){const button=$('#saby-state');try{const r=await fetch('/api/admin/saby/status',{headers:auth()}),d=await r.json();if(!r.ok)throw new Error();if(!d.configured){button.textContent='Saby: ждём ключи';button.disabled=true;return}button.textContent='Saby: проверить';button.disabled=false;button.onclick=async()=>{button.disabled=true;button.textContent='Saby: соединяемся…';try{const probe=await fetch('/api/admin/saby/test',{method:'POST',headers:auth()}),result=await probe.json();if(!probe.ok)throw new Error(result.detail||'Ошибка Saby');button.textContent='Saby: подключён';toast(`Saby доступен, точек продаж: ${result.points.length}`)}catch(e){button.textContent='Saby: ошибка';toast(e.message)}finally{button.disabled=false}}}catch(e){button.textContent='Saby: статус недоступен'}}
function updateMetrics(){const active=orders.filter(o=>['paid','confirmed'].includes(o.status)).length,work=orders.filter(o=>['packing','shipped'].includes(o.status)).length,revenue=orders.filter(o=>o.status!=='cancelled'&&isToday(o.created_at)).reduce((s,o)=>s+o.total,0),newLeads=leads.filter(x=>x.status==='new').length;$('#m-new').textContent=active;$('#m-work').textContent=work;$('#m-revenue').textContent=rub(revenue);$('#m-leads').textContent=newLeads;$('#orders-count').textContent=orders.length;$('#leads-count').textContent=leads.length}
function buildFilter(){const select=$('#status-filter'),current=select.value;select.replaceChildren(new Option('Все статусы',''));const labels=activeTab==='orders'?ORDER_LABELS:LEAD_LABELS;Object.entries(labels).forEach(([value,label])=>select.add(new Option(label,value)));select.value=current in labels?current:''}
function render(){content.replaceChildren();const query=$('#search').value.trim().toLocaleLowerCase('ru'),status=$('#status-filter').value;let values=activeTab==='orders'?orders:leads;values=values.filter(x=>(!status||x.status===status)&&(!query||searchable(x).includes(query)));if(!values.length){const empty=node('div','', 'empty');empty.append(node('strong',query||status?'Ничего не найдено':'Пока здесь пусто'),node('span',query||status?'Измените поиск или фильтр.':'Новые записи появятся автоматически.'));content.append(empty);return}values.forEach(value=>content.append(activeTab==='orders'?renderOrder(value):renderLead(value)))}
async function load(){content.innerHTML='<div class="skeleton"></div><div class="skeleton"></div>';try{const [or,lr]=await Promise.all([fetch('/api/admin/orders',{headers:auth()}),fetch('/api/admin/business-leads',{headers:auth()})]);if(or.status===401||lr.status===401)throw new Error('Нет доступа: проверьте секретную ссылку');const od=await or.json(),ld=await lr.json();if(!or.ok)throw new Error(od.detail||'Не удалось загрузить заказы');if(!lr.ok)throw new Error(ld.detail||'Не удалось загрузить заявки');orders=od.orders;leads=ld.leads;updateMetrics();render();$('#sync-label').textContent='Обновлено '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}catch(e){content.replaceChildren(node('div',e.message,'state'))}}
function setTab(tab){activeTab=tab;$('#tab-orders').setAttribute('aria-selected',tab==='orders');$('#tab-leads').setAttribute('aria-selected',tab==='leads');$('#search').placeholder=tab==='orders'?'Номер, имя, телефон, город…':'Компания, имя, телефон или Telegram…';buildFilter();render()}
if(!token){$('#access').hidden=false}else{$('#app').hidden=false;$('#tab-orders').onclick=()=>setTab('orders');$('#tab-leads').onclick=()=>setTab('leads');$('#search').oninput=render;$('#status-filter').onchange=render;$('#reload').onclick=()=>{load();loadSabyStatus()};buildFilter();load();loadSabyStatus()}
</script>
</body></html>
