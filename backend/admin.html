<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Заказы · Чайня</title>
<style>
:root{color-scheme:dark;--bg:#141110;--card:#211d1a;--line:#4b433c;--text:#eee;--muted:#a79f96;--accent:#d0a04d}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 system-ui,sans-serif}header{position:sticky;top:0;z-index:2;background:#141110ee;border-bottom:1px solid var(--line);padding:18px max(20px,calc((100vw - 1100px)/2));display:flex;align-items:center;gap:18px;justify-content:space-between}h1{font:30px/1.2 Georgia,serif;margin:0}.wrap{width:min(1100px,calc(100% - 40px));margin:28px auto 70px}.tools{display:flex;gap:10px;flex-wrap:wrap}select,button{background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:inherit}button{cursor:pointer}.orders{display:grid;gap:16px}.order{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}.order__head{display:flex;gap:14px;justify-content:space-between;align-items:flex-start}.order__id{font-weight:750;font-size:18px}.muted{color:var(--muted)}.badge{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:4px 9px;font-size:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.items{border-top:1px solid var(--line)}.item,.total{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}.total{font-size:17px;border:0;margin-top:5px}.contact p{margin:3px 0;overflow-wrap:anywhere}.status-row{display:flex;gap:8px;margin-top:16px}.status-row select{flex:1}.empty,.error{padding:40px;text-align:center;color:var(--muted)}.error{color:#e39183}@media(max-width:650px){header{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.order__head{flex-direction:column}.wrap{width:min(100% - 24px,1100px)}}
</style></head><body>
<header><h1>Заказы</h1><div class="tools"><select id="filter"><option value="">Все статусы</option><option value="pending_payment">Ожидает оплаты</option><option value="paid">Оплачен</option><option value="confirmed">Подтверждён</option><option value="packing">Собирается</option><option value="shipped">Передан в доставку</option><option value="completed">Завершён</option><option value="cancelled">Отменён</option></select><button id="reload">Обновить</button></div></header>
<main class="wrap"><div id="message" class="empty">Загружаем…</div><div class="orders" id="orders"></div></main>
<script>
const fragment=location.hash.slice(1);if(fragment)sessionStorage.setItem('chainya-admin-token',fragment);const token=fragment||sessionStorage.getItem('chainya-admin-token')||'',ordersEl=document.querySelector('#orders'),message=document.querySelector('#message');
const labels={pending_payment:'Ожидает оплаты',paid:'Оплачен',confirmed:'Подтверждён',packing:'Собирается',shipped:'Передан в доставку',completed:'Завершён',cancelled:'Отменён'};
const statuses=['paid','confirmed','packing','shipped','completed','cancelled'];const rub=n=>new Intl.NumberFormat('ru-RU').format(n)+' ₽';
const auth=()=>({Authorization:`Bearer ${token}`});
function text(tag,value,cls=''){const el=document.createElement(tag);el.textContent=value;if(cls)el.className=cls;return el}
function renderOrder(o){const card=document.createElement('article');card.className='order';const head=document.createElement('div');head.className='order__head';const left=document.createElement('div');left.append(text('div',`№ ${o.id}`,'order__id'),text('div',new Date(o.created_at).toLocaleString('ru-RU'),'muted'));head.append(left,text('span',labels[o.status]||o.status,'badge'));card.append(head);const grid=document.createElement('div');grid.className='grid';const items=document.createElement('div');items.className='items';o.items.forEach(x=>{const row=document.createElement('div');row.className='item';row.append(text('span',`${x.name} · ${x.pack==='pc'?'шт.':x.pack+' г'} × ${x.qty}`),text('span',rub(x.total)));items.append(row)});const total=document.createElement('div');total.className='total';total.append(text('b','Итого'),text('b',rub(o.total)));items.append(total);const contact=document.createElement('div');contact.className='contact';const c=o.customer||{};[['Имя',c.name],['Телефон',c.phone],['Город',c.city],['ПВЗ',c.pvz_code],['Адрес',c.address],['Комментарий',c.note]].forEach(([k,v])=>{if(v)contact.append(text('p',`${k}: ${v}`))});contact.append(text('p',`Доставка: ${o.delivery} · ${rub(o.delivery_price)}`,'muted'));grid.append(items,contact);card.append(grid);const controls=document.createElement('div');controls.className='status-row';const select=document.createElement('select');statuses.forEach(s=>{const option=new Option(labels[s],s,s===o.status,s===o.status);select.add(option)});const save=text('button','Сохранить');save.onclick=async()=>{save.disabled=true;try{const r=await fetch(`/api/admin/orders/${o.id}`,{method:'PATCH',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({status:select.value})});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');await load()}catch(e){alert(e.message);save.disabled=false}};controls.append(select,save);card.append(controls);return card}
async function load(){ordersEl.replaceChildren();message.className='empty';message.hidden=false;message.textContent=token?'Загружаем…':'В ссылке нет секретного ключа доступа.';if(!token)return;try{const status=document.querySelector('#filter').value;const r=await fetch('/api/admin/orders'+(status?'?status='+encodeURIComponent(status):''),{headers:auth()});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Нет доступа');message.hidden=true;if(!d.orders.length){message.hidden=false;message.textContent='Заказов с таким статусом нет.'}d.orders.forEach(o=>ordersEl.append(renderOrder(o)))}catch(e){message.hidden=false;message.className='error';message.textContent=e.message}}
document.querySelector('#reload').onclick=load;document.querySelector('#filter').onchange=load;load();
</script></body></html>
