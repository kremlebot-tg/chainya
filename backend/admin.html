<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#201c17">
  <link rel="icon" href="/favicon.png">
  <title>Управление заказами · Чайня</title>
  <style>
    @font-face{font-family:Prata;src:url('/fonts/prata-cyr.woff2') format('woff2');font-display:swap}@font-face{font-family:Golos;src:url('/fonts/golos-cyr.woff2') format('woff2');font-display:swap}
    :root{color-scheme:dark;--ink:#17130f;--brown:#201c17;--brown-2:#29231d;--paper:#e8dfcf;--paper-2:#d8cbb7;--paper-ink:#211b16;--line:#4a4036;--line-soft:#75695b;--text:#f2ece2;--muted:#b5aa9c;--quiet:#857a6e;--red:#b94738;--green:#7b9273;--blue:#748794;--amber:#b78342}
    *{box-sizing:border-box}html{background:var(--brown)}body{margin:0;color:var(--text);background:var(--brown);font:14px/1.5 Golos,Arial,sans-serif;-webkit-font-smoothing:antialiased}button,input,select{font:inherit}button{cursor:pointer}.shell{min-height:100vh}.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:#201c17f5}.topbar__in{width:min(1360px,calc(100% - 48px));height:82px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand{display:flex;align-items:center;gap:15px}.brand__mark{display:block;width:39px;height:45px;object-fit:contain}.brand h1{margin:0;font:22px/1 Prata,serif;letter-spacing:.06em}.brand small{display:block;margin-top:7px;color:var(--quiet);font:10px/1 Golos,sans-serif;letter-spacing:.18em;text-transform:uppercase}.top-actions{display:flex;align-items:center;gap:12px}.sync{color:var(--quiet);font-size:12px}.icon-btn,.btn,.select,.search,.status-select{border:1px solid var(--line-soft);background:transparent;color:var(--text);border-radius:0}.icon-btn{width:38px;height:38px;display:grid;place-items:center;padding:0}.icon-btn:hover,.btn:hover{background:var(--paper);color:var(--paper-ink)}.icon-btn svg{width:18px;fill:none;stroke:currentColor;stroke-width:1.8}.main{width:min(1360px,calc(100% - 48px));margin:0 auto 80px}.hero{display:grid;grid-template-columns:minmax(320px,1.1fr) minmax(380px,.9fr);min-height:230px;border-left:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.hero__intro{padding:43px 36px 35px}.eyebrow{display:block;margin-bottom:16px;color:#b9a384;font-size:10px;letter-spacing:.2em;text-transform:uppercase}.hero h2{max-width:12ch;font:clamp(34px,4.6vw,62px)/1.02 Prata,serif;margin:0}.hero p{max-width:52ch;margin:18px 0 0;color:var(--muted)}.hero__image{position:relative;min-height:230px;border-left:1px solid var(--line);background:url('/img/hall-shelf.webp') center 42%/cover no-repeat}.hero__image::after{content:"";position:absolute;inset:0;background:#1e160e55}.hero__caption{position:absolute;z-index:1;right:18px;bottom:15px;color:#eee4d6;font-size:10px;letter-spacing:.14em;text-transform:uppercase}.metrics{display:grid;grid-template-columns:1fr 1fr 1.4fr 1fr;border:1px solid var(--line);border-top:0;margin-bottom:28px}.metric{min-height:84px;padding:17px 22px;border-right:1px solid var(--line)}.metric:last-child{border-right:0}.metric__label{display:block;color:var(--quiet);font-size:10px;letter-spacing:.1em;text-transform:uppercase}.metric__value{display:block;margin-top:8px;font:22px/1 Prata,serif;font-variant-numeric:tabular-nums}.metric--attention .metric__value{color:#d7b98c}.workspace{border:1px solid var(--line);background:#191612}.workspace-head{display:flex;align-items:stretch;justify-content:space-between;border-bottom:1px solid var(--line)}.tabs{display:flex}.tab{position:relative;border:0;border-right:1px solid var(--line);background:transparent;color:var(--quiet);padding:19px 24px;font-weight:600}.tab[aria-selected="true"]{color:var(--text);background:#211d18}.tab[aria-selected="true"]::after{content:"";position:absolute;left:22px;right:22px;bottom:-1px;height:2px;background:var(--red)}.count{margin-left:8px;color:#b9a384;font-size:11px}.toolbar{display:flex;align-items:center;gap:0;margin-left:auto}.search-wrap{position:relative;width:min(36vw,390px);border-left:1px solid var(--line)}.search{width:100%;height:58px;padding:0 16px 0 45px;border:0;outline:none}.search:focus{background:#251f19}.search-wrap svg{position:absolute;left:18px;top:20px;width:17px;fill:none;stroke:var(--quiet);stroke-width:1.8}.select{height:58px;padding:0 42px 0 17px;border-width:0 0 0 1px;outline:none;background:#191612}.order{display:grid;grid-template-columns:170px minmax(320px,1.2fr) minmax(260px,.9fr) 185px;gap:26px;padding:27px 24px;border-bottom:1px solid var(--line);border-left:3px solid transparent}.order:last-child{border-bottom:0}.order:hover{background:#1f1b16;border-left-color:#76634d}.order__number{font:18px/1.2 Prata,serif}.order__date{color:var(--quiet);font-size:11px;margin-top:7px}.badge{display:inline-block;margin-top:16px;padding:5px 8px;border:1px solid var(--line-soft);color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase}.badge[data-status="paid"],.badge[data-status="confirmed"]{border-color:#9c7547;color:#d5b88f}.badge[data-status="packing"]{border-color:#876542}.badge[data-status="shipped"]{border-color:#607b8b}.badge[data-status="completed"]{border-color:#60795d}.badge[data-status="cancelled"]{border-color:#9c544c}.items{display:grid;gap:11px}.item{display:grid;grid-template-columns:45px 1fr auto;gap:11px;align-items:center}.item__photo{width:45px;height:45px;object-fit:cover;background:#2b251e}.item__name{font-weight:600}.item__meta{color:var(--quiet);font-size:11px}.money{white-space:nowrap;font-variant-numeric:tabular-nums}.summary-line{display:flex;justify-content:space-between;gap:12px;margin-top:5px;padding-top:12px;border-top:1px solid var(--line);font-size:16px}.customer{min-width:0}.customer__name{font:17px/1.25 Prata,serif;margin-bottom:9px}.detail{display:flex;align-items:flex-start;gap:8px;color:var(--muted);margin:5px 0;overflow-wrap:anywhere}.detail svg{width:15px;min-width:15px;margin-top:2px;fill:none;stroke:var(--quiet);stroke-width:1.7}.detail a{color:var(--text);text-decoration:none;border-bottom:1px solid var(--line-soft)}.note{margin-top:11px;padding:8px 0 8px 11px;border-left:1px solid #9b8060;color:var(--muted)}.delivery{color:var(--quiet);font-size:11px;margin-top:10px}.actions{display:flex;flex-direction:column;gap:8px}.status-select{width:100%;height:39px;padding:0 9px;background:var(--ink)}.btn{height:39px;padding:0 13px;font-weight:600}.btn--primary{background:var(--paper);border-color:var(--paper);color:var(--paper-ink)}.btn--primary:hover{background:#f2eadc}.btn:disabled{opacity:.4;cursor:default}.copy-btn{height:33px;color:var(--muted);font-size:11px}.lead{display:grid;grid-template-columns:170px minmax(240px,.8fr) 1fr 185px;gap:26px;padding:27px 24px;border-bottom:1px solid var(--line)}.lead__company{font:17px/1.25 Prata,serif}.muted{color:var(--muted);margin-top:6px}.state,.empty{padding:70px 24px;text-align:center;color:var(--muted)}.state strong,.empty strong{display:block;color:var(--text);font:18px Prata,serif;margin-bottom:6px}.skeleton{height:120px;margin:0;border-bottom:1px solid var(--line);background:#1e1a16;opacity:.7;animation:pulse 1.2s infinite alternate}@keyframes pulse{to{opacity:.35}}.toast{position:fixed;right:24px;bottom:24px;z-index:30;padding:12px 16px;border:1px solid var(--paper-2);background:var(--paper);color:var(--paper-ink);transform:translateY(20px);opacity:0;pointer-events:none;transition:.2s}.toast.on{transform:none;opacity:1}.access-error{width:min(560px,calc(100% - 32px));margin:15vh auto;padding:40px;border:1px solid var(--line);background:#191612;text-align:center}.access-error::before{content:"";display:block;width:44px;height:52px;margin:0 auto 24px;background:url('/img/logo-mark.webp') center/contain no-repeat}.access-error h2{font:30px Prata,serif;margin:0 0 10px}.access-error p{color:var(--muted)}
    @media(max-width:1050px){.order{grid-template-columns:145px 1fr 1fr}.actions{grid-column:2/4;flex-direction:row}.actions>*{flex:1}.lead{grid-template-columns:145px .8fr 1fr}.lead .actions{grid-column:2/4}.workspace-head{display:block}.toolbar{border-top:1px solid var(--line)}.search-wrap{width:auto;flex:1;border-left:0}}
    @media(max-width:700px){.topbar__in,.main{width:100%}.topbar__in{height:68px;padding:0 16px}.brand__mark{width:30px;height:36px}.brand h1{font-size:18px}.brand small,.sync,#saby-state{display:none}.main{margin-bottom:40px}.hero{grid-template-columns:1fr;min-height:0;border-left:0;border-right:0}.hero__intro{padding:31px 18px 27px}.hero h2{font-size:39px}.hero p{font-size:13px}.hero__image{min-height:115px;border:0;border-top:1px solid var(--line);background-position:center 48%}.metrics{grid-template-columns:1fr 1fr;border-left:0;border-right:0;margin-bottom:18px}.metric{min-height:76px;padding:15px 18px;border-bottom:1px solid var(--line)}.metric:nth-child(2){border-right:0}.metric:nth-child(3),.metric:nth-child(4){border-bottom:0}.metric__value{font-size:19px}.workspace{border-left:0;border-right:0}.tabs{width:100%}.tab{flex:1;padding:17px 13px}.toolbar{display:grid;grid-template-columns:1fr}.search-wrap{width:100%;border-bottom:1px solid var(--line)}.select{width:100%;border-left:0}.order,.lead{grid-template-columns:1fr;padding:22px 18px;gap:19px;border-left:0}.actions,.lead .actions{grid-column:auto;flex-direction:row}.order__identity{display:flex;justify-content:space-between;gap:12px;align-items:start}.badge{margin-top:0;text-align:right}.customer{padding-top:17px;border-top:1px solid var(--line)}.item{grid-template-columns:42px 1fr auto}.item__photo{width:42px;height:42px}.toast{left:12px;right:12px;bottom:12px;text-align:center}}
  </style>
</head>
<body>
<div class="shell" id="app" hidden>
  <header class="topbar"><div class="topbar__in">
    <div class="brand"><img class="brand__mark" src="/img/logo-mark.webp" alt=""><div><h1>Чайня</h1><small>книга заказов</small></div></div>
    <div class="top-actions"><button class="btn copy-btn" id="saby-state" disabled>Saby: проверяем</button><span class="sync" id="sync-label"></span><button class="icon-btn" id="reload" aria-label="Обновить"><svg viewBox="0 0 24 24"><path d="M20 6v5h-5M4 18v-5h5M18.5 9A7 7 0 0 0 6.2 6.2L4 8m16 8-2.2 1.8A7 7 0 0 1 5.5 15"/></svg></button></div>
  </div></header>
  <main class="main">
    <div class="hero"><div class="hero__intro"><span class="eyebrow">Москва · Острякова, 3</span><h2>Книга заказов</h2><p>Новые покупки, сборка и доставка — спокойно и по порядку.</p></div><div class="hero__image" role="img" aria-label="Полки с чайной посудой в Чайне"><span class="hero__caption">Чайня · мск</span></div></div>
    <section class="metrics" aria-label="Сводка">
      <div class="metric metric--attention"><span class="metric__label">Новые заказы</span><strong class="metric__value" id="m-new">—</strong></div>
      <div class="metric"><span class="metric__label">В работе</span><strong class="metric__value" id="m-work">—</strong></div>
      <div class="metric"><span class="metric__label">Выручка сегодня</span><strong class="metric__value" id="m-revenue">—</strong></div>
      <div class="metric"><span class="metric__label">Новые B2B</span><strong class="metric__value" id="m-leads">—</strong></div>
    </section>
    <section class="workspace">
      <div class="workspace-head"><div class="tabs" role="tablist"><button class="tab" id="tab-orders" role="tab" aria-selected="true">Заказы <span class="count" id="orders-count">0</span></button><button class="tab" id="tab-leads" role="tab" aria-selected="false">Для бизнеса <span class="count" id="leads-count">0</span></button></div>
      <div class="toolbar"><div class="search-wrap"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16 16 5 5"/></svg><input class="search" id="search" type="search" placeholder="Номер, имя, телефон, город…" aria-label="Поиск" autocomplete="off"></div><select class="select" id="status-filter" aria-label="Статус"><option value="">Все статусы</option></select></div></div>
      <div id="content"><div class="skeleton"></div><div class="skeleton"></div></div>
    </section>
  </main>
</div>
<div class="access-error" id="access" hidden><h2>Нет доступа</h2><p>Откройте полную секретную ссылку на панель. Ключ находится после символа #.</p></div>
<div class="toast" id="toast" role="status"></div>
<script>
const fragment=location.hash.slice(1);if(fragment)sessionStorage.setItem('chainya-admin-token',fragment);const token=fragment||sessionStorage.getItem('chainya-admin-token')||'';
const ORDER_LABELS={pending_payment:'Ожидает оплаты',paid:'Новый · оплачен',confirmed:'Подтверждён',packing:'Собирается',shipped:'Передан в доставку',completed:'Завершён',cancelled:'Отменён'};
const LEAD_LABELS={new:'Новая',contacted:'Связались',closed:'Закрыта'};
const ORDER_STATUSES=['pending_payment','paid','confirmed','packing','shipped','completed','cancelled'];
const DELIVERY={pickup:'Самовывоз · Острякова, 3',cdek_pvz:'СДЭК · пункт выдачи',cdek_courier:'СДЭК · курьер'};
const PAYMENT={bank_card:'Банковская карта',sbp:'СБП'};
const $=s=>document.querySelector(s),content=$('#content');let orders=[],leads=[],activeTab='orders';
const auth=()=>({Authorization:`Bearer ${token}`});const rub=n=>new Intl.NumberFormat('ru-RU').format(n)+' ₽';
const node=(tag,text='',cls='')=>{const el=document.createElement(tag);if(text!==undefined)el.textContent=text;if(cls)el.className=cls;return el};
const icon=path=>{const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 24 24');const p=document.createElementNS(svg.namespaceURI,'path');p.setAttribute('d',path);svg.append(p);return svg};
function toast(message){const el=$('#toast');el.textContent=message;el.classList.add('on');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.remove('on'),2200)}
function fmtDate(value){return new Intl.DateTimeFormat('ru-RU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(value))}
function isToday(value){const d=new Date(value),n=new Date();return d.toDateString()===n.toDateString()}
function searchable(value){return JSON.stringify(value).toLocaleLowerCase('ru')}
function detail(path,value,href){if(!value)return null;const row=node('div','', 'detail');row.append(icon(path));const valueEl=href?node('a',value):node('span',value);if(href)valueEl.href=href;row.append(valueEl);return row}
function statusSelect(current,labels,values){const select=node('select','', 'status-select');values.forEach(value=>select.add(new Option(labels[value],value,value===current,value===current)));return select}
function renderOrder(o){
  const card=node('article','', 'order');const identity=node('div','', 'order__identity');const idWrap=node('div');idWrap.append(node('div','№ '+o.id,'order__number'),node('div',fmtDate(o.created_at),'order__date'));const badge=node('span',ORDER_LABELS[o.status]||o.status,'badge');badge.dataset.status=o.status;identity.append(idWrap,badge);
  const itemWrap=node('div','', 'items');o.items.forEach(item=>{const row=node('div','', 'item'),photo=node('img','','item__photo');photo.src='/img/tea-'+encodeURIComponent(item.id)+'.webp';photo.alt='';photo.loading='lazy';photo.onerror=()=>photo.style.visibility='hidden';const info=node('div');info.append(node('div',item.name,'item__name'),node('div',(item.pack==='pc'?'1 шт.':item.pack+' г')+' × '+item.qty,'item__meta'));row.append(photo,info,node('span',rub(item.total),'money'));itemWrap.append(row)});const total=node('div','', 'summary-line');total.append(node('strong','Итого'),node('strong',rub(o.total),'money'));itemWrap.append(total);
  const c=o.customer||{},customer=node('div','', 'customer');customer.append(node('div',c.name||'Без имени','customer__name'));[detail('M5 4h4l2 5-2.5 1.5a15 15 0 0 0 5 5L15 13l5 2v4c0 1-1 2-2 2C9.7 20.5 3.5 14.3 3 6c0-1 1-2 2-2Z',c.phone,c.phone?'tel:'+c.phone.replace(/[^+\d]/g,''):''),detail('M12 21s7-5.4 7-12a7 7 0 1 0-14 0c0 6.6 7 12 7 12Zm0-9a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z',[c.city,c.pvz_code?'ПВЗ '+c.pvz_code:c.address].filter(Boolean).join(' · '))].filter(Boolean).forEach(x=>customer.append(x));if(c.note)customer.append(node('div',c.note,'note'));customer.append(node('div',(DELIVERY[o.delivery]||o.delivery)+' · '+rub(o.delivery_price)+' · '+(PAYMENT[o.payment_method]||o.payment_method),'delivery'));
  const actions=node('div','', 'actions'),select=statusSelect(o.status,ORDER_LABELS,ORDER_STATUSES),save=node('button','Сохранить','btn btn--primary');save.disabled=true;select.onchange=()=>save.disabled=select.value===o.status;save.onclick=()=>updateOrder(o.id,select.value,save);const copy=node('button','Скопировать заказ','btn copy-btn');copy.onclick=()=>copyOrder(o);actions.append(select,save,copy);card.append(identity,itemWrap,customer,actions);return card;
}
function renderLead(lead){const card=node('article','', 'lead');const identity=node('div');identity.append(node('div','№ '+lead.id,'order__number'),node('div',fmtDate(lead.created_at),'order__date'));const badge=node('span',LEAD_LABELS[lead.status]||lead.status,'badge');badge.dataset.status=lead.status;identity.append(badge);const person=node('div');person.append(node('div',lead.company||'Без названия','lead__company'),node('div',lead.name||'Имя не указано','muted'));const body=node('div');const contact=detail('M5 4h4l2 5-2.5 1.5a15 15 0 0 0 5 5L15 13l5 2v4c0 1-1 2-2-2 2C9.7 20.5 3.5 14.3 3 6c0-1 1-2 2-2Z',lead.contact,lead.contact.startsWith('@')?'https://t.me/'+lead.contact.slice(1):'tel:'+lead.contact.replace(/[^+\d]/g,''));if(contact)body.append(contact);if(lead.note)body.append(node('div',lead.note,'note'));const actions=node('div','', 'actions'),select=statusSelect(lead.status,LEAD_LABELS,['new','contacted','closed']),save=node('button','Сохранить','btn btn--primary');save.disabled=true;select.onchange=()=>save.disabled=select.value===lead.status;save.onclick=()=>updateLead(lead.id,select.value,save);actions.append(select,save);card.append(identity,person,body,actions);return card}
function copyOrder(o){const c=o.customer||{};const lines=[`Заказ № ${o.id}`,...o.items.map(x=>`${x.name} · ${x.pack==='pc'?'шт.':x.pack+' г'} × ${x.qty} — ${rub(x.total)}`),`Итого: ${rub(o.total)}`,c.name?`Имя: ${c.name}`:'',c.phone?`Телефон: ${c.phone}`:'',[c.city,c.pvz_code,c.address].filter(Boolean).join(', ')].filter(Boolean);navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('Заказ скопирован'))}
async function updateOrder(id,status,button){button.disabled=true;try{const r=await fetch('/api/admin/orders/'+id,{method:'PATCH',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({status})});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');toast('Статус заказа обновлён');await load()}catch(e){toast(e.message);button.disabled=false}}
async function updateLead(id,status,button){button.disabled=true;try{const r=await fetch('/api/admin/business-leads/'+id,{method:'PATCH',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({status})});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');toast('Статус заявки обновлён');await load()}catch(e){toast(e.message);button.disabled=false}}
async function loadSabyStatus(){const button=$('#saby-state');try{const r=await fetch('/api/admin/saby/status',{headers:auth()}),d=await r.json();if(!r.ok)throw new Error();if(!d.configured){button.textContent='Saby: ждём ключи';button.disabled=true;return}button.textContent='Saby: проверить';button.disabled=false;button.onclick=async()=>{button.disabled=true;button.textContent='Saby: соединяемся…';try{const probe=await fetch('/api/admin/saby/test',{method:'POST',headers:auth()}),result=await probe.json();if(!probe.ok)throw new Error(result.detail||'Ошибка Saby');button.textContent='Saby: подключён';toast(`Saby доступен, точек продаж: ${result.points.length}`)}catch(e){button.textContent='Saby: ошибка';toast(e.message)}finally{button.disabled=false}}}catch(e){button.textContent='Saby: статус недоступен'}}
function updateMetrics(){const active=orders.filter(o=>['paid','confirmed'].includes(o.status)).length,work=orders.filter(o=>['packing','shipped'].includes(o.status)).length,revenue=orders.filter(o=>o.status!=='cancelled'&&isToday(o.created_at)).reduce((s,o)=>s+o.total,0),newLeads=leads.filter(x=>x.status==='new').length;$('#m-new').textContent=active;$('#m-work').textContent=work;$('#m-revenue').textContent=rub(revenue);$('#m-leads').textContent=newLeads;$('#orders-count').textContent=orders.length;$('#leads-count').textContent=leads.length}
function buildFilter(){const select=$('#status-filter'),current=select.value;select.replaceChildren(new Option('Все статусы',''));const labels=activeTab==='orders'?ORDER_LABELS:LEAD_LABELS;Object.entries(labels).forEach(([value,label])=>select.add(new Option(label,value)));select.value=current in labels?current:''}
function render(){content.replaceChildren();const query=$('#search').value.trim().toLocaleLowerCase('ru'),status=$('#status-filter').value;let values=activeTab==='orders'?orders:leads;values=values.filter(x=>(!status||x.status===status)&&(!query||searchable(x).includes(query)));if(!values.length){const empty=node('div','', 'empty');empty.append(node('strong',query||status?'Ничего не найдено':'Пока здесь пусто'),node('span',query||status?'Измените поиск или фильтр.':'Новые записи появятся автоматически.'));content.append(empty);return}values.forEach(value=>content.append(activeTab==='orders'?renderOrder(value):renderLead(value)))}
async function load(){content.innerHTML='<div class="skeleton"></div><div class="skeleton"></div>';try{const [or,lr]=await Promise.all([fetch('/api/admin/orders',{headers:auth()}),fetch('/api/admin/business-leads',{headers:auth()})]);if(or.status===401||lr.status===401)throw new Error('Нет доступа: проверьте секретную ссылку');const od=await or.json(),ld=await lr.json();if(!or.ok)throw new Error(od.detail||'Не удалось загрузить заказы');if(!lr.ok)throw new Error(ld.detail||'Не удалось загрузить заявки');orders=od.orders;leads=ld.leads;updateMetrics();render();$('#sync-label').textContent='Обновлено '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}catch(e){content.replaceChildren(node('div',e.message,'state'))}}
function setTab(tab){activeTab=tab;$('#tab-orders').setAttribute('aria-selected',tab==='orders');$('#tab-leads').setAttribute('aria-selected',tab==='leads');$('#search').placeholder=tab==='orders'?'Номер, имя, телефон, город…':'Компания, имя, телефон или Telegram…';buildFilter();render()}
if(!token){$('#access').hidden=false}else{$('#app').hidden=false;$('#tab-orders').onclick=()=>setTab('orders');$('#tab-leads').onclick=()=>setTab('leads');$('#search').oninput=render;$('#status-filter').onchange=render;$('#reload').onclick=()=>{load();loadSabyStatus()};buildFilter();load();loadSabyStatus()}
</script>
</body></html>
