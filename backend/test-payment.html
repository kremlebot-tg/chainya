<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Заказ · Чайня</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{font:15px/1.5 system-ui;background:#141110;color:#eee;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px}.card{width:min(520px,100%);padding:32px;border:1px solid #554b40;border-radius:18px;background:#211d1a}h1{margin:0 0 6px;font:34px/1.2 Georgia,serif}.muted{color:#aaa}.order-no{margin:0 0 22px}.items{border-top:1px solid #443d37}.item,.sum{display:flex;justify-content:space-between;gap:18px;padding:13px 0;border-bottom:1px solid #443d37}.item span:last-child,.sum b{white-space:nowrap}.totals{margin:15px 0 24px}.sum{border:0;padding:4px 0}.sum.total{font-size:19px;margin-top:6px}.pay,.back{display:block;box-sizing:border-box;width:100%;padding:14px;border:0;border-radius:10px;background:#c99a4b;color:#17110a;text-align:center;text-decoration:none;font:inherit;font-weight:700;cursor:pointer}.pay:disabled{opacity:.55}.back{margin-top:14px;background:transparent;color:#ddd;border:1px solid #554b40}#status{min-height:24px;margin:14px 0 0}.paid{color:#9fc38b}
</style></head>
<body><main class="card">
  <h1>Ваш заказ</h1><p class="muted order-no" id="order-no">Загружаем…</p>
  <div class="items" id="items"></div>
  <div class="totals" id="totals" hidden>
    <div class="sum"><span>Товары</span><span id="subtotal"></span></div>
    <div class="sum"><span>Доставка</span><span id="delivery"></span></div>
    <div class="sum total"><b>Итого</b><b id="total"></b></div>
  </div>
  <p class="muted">Тестовый режим: деньги не списываются.</p>
  <button class="pay" id="pay" hidden>Имитировать успешную оплату</button>
  <p id="status" aria-live="polite"></p>
  <a class="back" href="/#shop">Вернуться в магазин</a>
</main>
<script>
const id=location.pathname.split('/').pop(),token=new URLSearchParams(location.search).get('token')||'',pay=document.querySelector('#pay'),status=document.querySelector('#status');
const rub=n=>new Intl.NumberFormat('ru-RU').format(n)+' ₽';
function render(d){
  document.querySelector('#order-no').textContent=`Заказ № ${d.id}`;
  const items=document.querySelector('#items');items.replaceChildren();
  d.items.forEach(x=>{const row=document.createElement('div');row.className='item';const name=document.createElement('span');name.textContent=`${x.name} · ${x.pack==='pc'?'шт.':x.pack+' г'} × ${x.qty}`;const price=document.createElement('span');price.textContent=rub(x.total);row.append(name,price);items.append(row)});
  document.querySelector('#subtotal').textContent=rub(d.subtotal);document.querySelector('#delivery').textContent=rub(d.delivery_price);document.querySelector('#total').textContent=rub(d.total);document.querySelector('#totals').hidden=false;
  if(d.status==='paid'){status.textContent='Заказ оплачен в тестовом режиме. Уведомление отправлено владельцам.';status.className='paid';pay.hidden=true}else{pay.hidden=false}
}
async function load(){try{const r=await fetch(`/api/orders/${id}?token=${encodeURIComponent(token)}`);const d=await r.json();if(!r.ok)throw new Error(d.detail||'Заказ не найден');render(d)}catch(e){status.textContent=e.message;document.querySelector('#order-no').textContent='Не удалось открыть заказ'}}
pay.onclick=async()=>{pay.disabled=true;status.textContent='Обрабатываем…';try{const r=await fetch(`/api/orders/${id}/test-pay?token=${encodeURIComponent(token)}`,{method:'POST'});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');render(d)}catch(e){status.textContent=e.message;pay.disabled=false}};
load();
</script></body></html>
