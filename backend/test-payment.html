<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Тестовая оплата · Чайня</title>
<style>body{font:16px system-ui;background:#141110;color:#eee;display:grid;place-items:center;min-height:100vh;margin:0}.card{max-width:420px;padding:32px;border:1px solid #554b40;border-radius:18px;background:#211d1a}button{width:100%;padding:14px;border:0;border-radius:10px;background:#c99a4b;font:inherit;font-weight:700;cursor:pointer}.muted{color:#aaa;line-height:1.5}</style></head>
<body><main class="card"><h1>Тестовая оплата</h1><p class="muted">Деньги не списываются. Кнопка только переводит заказ в статус «оплачен».</p><button id="pay">Имитировать успешную оплату</button><p id="status" aria-live="polite"></p></main>
<script>const id=location.pathname.split('/').pop();document.querySelector('#pay').onclick=async()=>{const b=document.querySelector('#pay'),s=document.querySelector('#status');b.disabled=true;s.textContent='Обрабатываем…';try{const r=await fetch(`/api/orders/${id}/test-pay`,{method:'POST'});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Ошибка');s.textContent=`Заказ ${d.id} оплачен в тестовом режиме.`;b.hidden=true}catch(e){s.textContent=e.message;b.disabled=false}}</script></body></html>
